<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8402F"/>
      <stop offset="0.5" stop-color="#B00810"/>
      <stop offset="1" stop-color="#5E0109"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.5" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3a0006" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#gloss)"/>
  <rect width="512" height="512" fill="url(#vig)"/>

  <!-- upholstery stitch seam accent -->
  <path d="M104 372 C 200 336, 312 336, 408 372" fill="none"
        stroke="#ffffff" stroke-opacity="0.55" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="2 26"/>

  <!-- CN monogram -->
  <text x="256" y="300" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif" font-weight="700"
        font-size="240" letter-spacing="-6" fill="#ffffff" filter="url(#ds)">CN</text>
</svg>